# Airlift's secrets resolver substitutes ${ENV:NAME} before the factory sees
# this file, so the password never has to be committed to the repo.
baleia.jdbc-url=jdbc:postgresql://postgres:5432/baleia
baleia.username=baleia_trino
baleia.password=${ENV:BALEIA_TRINO_DB_PASSWORD}
baleia.cluster-name=default
baleia.connect-timeout=10s