name: Maven Package

on:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'oracle'
        server-id: github
        settings-path: ${{ github.workspace }}

    - name: Build with Maven
      run: mvn -B package --file pom.xml

    - name: Publish to GitHub Packages
      run: |
        mvn deploy -s $GITHUB_WORKSPACE/settings.xml \
          -DaltDeploymentRepository=github::default::https://maven.pkg.github.com/maltzsama/baleia-trino-catalog-store
      env:
        GITHUB_TOKEN: ${{ github.token }}
